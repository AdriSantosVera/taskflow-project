<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro — Interactividad</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="top">
    <h1>Registro</h1>
    <p>App de tareas </p>
  </header>

  <main class="wrap">
    <!-- Formulario (requisito 1) -->
    <section class="panel">
      <h2>Nueva tarea</h2>

      <form id="taskForm" class="form">
        <input
          id="taskInput"
          type="text"
          placeholder="Escribe una tarea…"
          autocomplete="off"
          required
        />
        <button type="submit">Añadir</button>
      </form>

      <!-- Busqueda -->
      <input
        id="searchInput"
        class="search"
        type="text"
        placeholder="Buscar tareas "
        autocomplete="off"
      />

    </section>

    <!-- Lista (DOM) -->
    <section class="panel">
      <div class="row">
        <h2>Lista</h2>
        <span id="count" class="count">0</span>
      </div>

      <ul id="taskList" class="list"></ul>

      <div id="empty" class="empty">No hay tareas todavía.</div>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
